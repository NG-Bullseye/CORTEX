esphome:
  name: cyd-touch-test
  friendly_name: "CYD Touch Test"
  on_boot:
    priority: -100
    then:
      - component.update: main_display

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !env_var ESPHOME_WIFI_SSID
  password: !env_var ESPHOME_WIFI_PASSWORD
  ap:
    ssid: "cyd-touch-fallback"
    password: "12345678"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── SPI Buses ──────────────────────────────────────────
spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin:
      number: 12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

# ── Backlight ──────────────────────────────────────────
output:
  - id: backlight_pwm
    platform: ledc
    pin: 21

light:
  - id: backlight
    platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    restore_mode: ALWAYS_ON

# ── Display (no LVGL - raw drawing only) ───────────────
display:
  - id: main_display
    platform: ili9xxx
    model: ILI9341
    spi_id: tft
    cs_pin:
      number: 15
      ignore_strapping_warning: true
    dc_pin:
      number: 2
      ignore_strapping_warning: true
    invert_colors: false
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    dimensions:
      width: 320
      height: 240
    update_interval: never
    lambda: |-
      it.fill(Color(0, 0, 0));
      it.print(10, 10, id(font_small), Color(0, 255, 0), "CYD TOUCH TEST");
      it.print(10, 30, id(font_small), Color(0, 200, 200), "Touch screen to test...");
      it.print(10, 50, id(font_small), Color(200, 200, 0), "Watch serial logs for TOUCH events.");
      // Draw 3 test buttons as colored rectangles
      it.filled_rectangle(10, 80, 90, 50, Color(0, 100, 50));
      it.print(20, 98, id(font_small), Color(0, 255, 100), "BTN A");
      it.filled_rectangle(115, 80, 90, 50, Color(100, 50, 0));
      it.print(125, 98, id(font_small), Color(255, 200, 0), "BTN B");
      it.filled_rectangle(220, 80, 90, 50, Color(100, 0, 0));
      it.print(230, 98, id(font_small), Color(255, 50, 50), "BTN C");
      // Coordinate display area
      it.rectangle(10, 145, 300, 30, Color(50, 50, 50));
      it.printf(20, 153, id(font_small), Color(150, 150, 150), "x=%-4d y=%-4d",
        (int)id(last_touch_x), (int)id(last_touch_y));

font:
  - file: "gfonts://Share Tech Mono"
    id: font_small
    size: 14

# ── Touch Globals ───────────────────────────────────────
globals:
  - id: last_touch_x
    type: float
    restore_value: no
    initial_value: '0'
  - id: last_touch_y
    type: float
    restore_value: no
    initial_value: '0'

# ── Touchscreen (raw, NO interrupt_pin) ────────────────
touchscreen:
  - id: main_touch
    platform: xpt2046
    spi_id: touch
    cs_pin: 33
    # No interrupt_pin - pure polling mode
    threshold: 400
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
      mirror_y: true
    on_touch:
      then:
        - globals.set:
            id: last_touch_x
            value: !lambda 'return touch.x;'
        - globals.set:
            id: last_touch_y
            value: !lambda 'return touch.y;'
        - logger.log:
            format: ">>> TOUCH: x=%d y=%d (raw: x=%d y=%d)"
            args: [touch.x, touch.y, touch.x_raw, touch.y_raw]
        - component.update: main_display
        # Check which button zone was hit
        - if:
            condition:
              lambda: 'return touch.x >= 10 && touch.x <= 100 && touch.y >= 80 && touch.y <= 130;'
            then:
              - logger.log: ">>> BTN A PRESSED"
        - if:
            condition:
              lambda: 'return touch.x >= 115 && touch.x <= 205 && touch.y >= 80 && touch.y <= 130;'
            then:
              - logger.log: ">>> BTN B PRESSED"
        - if:
            condition:
              lambda: 'return touch.x >= 220 && touch.x <= 310 && touch.y >= 80 && touch.y <= 130;'
            then:
              - logger.log: ">>> BTN C PRESSED"
